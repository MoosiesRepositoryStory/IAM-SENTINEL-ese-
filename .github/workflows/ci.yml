name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy app/

      - name: Test
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=88

      - name: Verify migrations apply
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite:///ci.db

  e2e:
    runs-on: ubuntu-latest
    # Independent of `quality` (runs in parallel, not blocked on it) — see
    # tests/e2e/README.md. Needs its own live server + seeded DB + a browser
    # binary, none of which the unit-test job has.
    #
    # Plain /tmp path rather than `${{ runner.temp }}`: the `runner` context
    # isn't available in a job-level `env:` block (only within
    # `jobs.<id>.steps`), and GitHub rejects the whole workflow file at parse
    # time if it's referenced here — not a runtime failure, the run never
    # even gets scheduled (0 jobs). DATABASE_URL is left unset — Settings.
    # from_env() derives it from DATA_DIR alone (sqlite:///<data_dir>/
    # sentinel.db), the same thing seed.py/server.py both do locally.
    env:
      DATA_DIR: /tmp/e2e-data
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e]"
          playwright install --with-deps chromium

      - name: Seed E2E data
        run: python tests/e2e/seed.py

      - name: Start server
        run: |
          python tests/e2e/server.py 5000 > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/healthz > /dev/null; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Server never became healthy." >&2
          cat server.log
          exit 1

      - name: Run E2E suite
        run: pytest tests/e2e --base-url=http://127.0.0.1:5000 -v

      - name: Server log
        if: always()
        run: cat server.log || true

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

  docker:
    runs-on: ubuntu-latest
    # Builds the real image (Dockerfile/docker-compose.yml) and runs the same
    # E2E suite against IT specifically — a genuinely different check from
    # `e2e` above (which runs the app directly via server.py, never through
    # the container/gunicorn/entrypoint-migration path at all). Seeding runs
    # as a plain host-side Python process against the same Postgres via its
    # published port (docker-compose.yml maps 5432:5432) rather than execing
    # into the container — reuses seed.py exactly as-is.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Host-side install: seeding + the E2E driver need the psycopg driver
      # and playwright, not anything running inside the container itself.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e,docker]"
          playwright install --with-deps chromium

      - name: Build and start the containerized stack
        run: docker compose up --build -d

      - name: Wait for the app to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/healthz > /dev/null; then
              echo "App is up (this also proves the entrypoint's migrations succeeded against Postgres)."
              exit 0
            fi
            sleep 2
          done
          echo "App never became healthy." >&2
          docker compose logs
          exit 1

      - name: Seed E2E data
        run: python tests/e2e/seed.py
        env:
          DATABASE_URL: postgresql+psycopg://sentinel:sentinel@localhost:5432/sentinel

      - name: Run E2E suite against the containerized app
        run: pytest tests/e2e --base-url=http://127.0.0.1:8000 -v

      - name: Container logs
        if: always()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
