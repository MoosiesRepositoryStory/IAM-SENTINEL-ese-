name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy app/

      - name: Test
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Verify migrations apply
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite:///ci.db
